services:
  - type: web
    name: foodster-backend
    env: node
    region: oregon
    rootDir: foodster-backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false   # Set in Render dashboard
      - key: JWT_SECRET
        sync: false   # Set in Render dashboard
      - key: FRONTEND_URL
        sync: false   # Set to your Vercel URL e.g. https://your-app.vercel.app
